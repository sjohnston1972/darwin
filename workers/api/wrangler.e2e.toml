name = "darwin-api-e2e"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[vars]
DARWIN_AI_MODE = "live"
DARWIN_E2E_FIXTURES = "1"
OPENAI_API_KEY = "e2e-openai-boundary-fixture"
OPENAI_MODEL = "gpt-5.6"
OPENAI_TIMEOUT_MS = "10000"
GITHUB_TOKEN = "e2e-github-boundary-fixture"
DARWIN_CALLBACK_TOKEN = "e2e-callback-boundary-fixture"
DARWIN_DEMO_SEED = "1859"
DARWIN_EVENT_COUNT = "10000"
PROJECTFLOW_REPOSITORY = "sjohnston1972/projectflow"
PROJECTFLOW_BRANCH = "main"
PROJECTFLOW_PRODUCTION_URL = "http://localhost:5174/"
PROJECTFLOW_STUDY_URL = "http://localhost:5174/?study=true"
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"

[[d1_databases]]
binding = "DB"
database_name = "darwin-telemetry-e2e"
database_id = "00000000-0000-0000-0000-000000001859"
migrations_dir = "migrations"
