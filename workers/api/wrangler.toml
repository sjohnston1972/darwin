name = "darwin-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[triggers]
crons = ["17 3 * * *"]

[vars]
DARWIN_AI_MODE = "live"
OPENAI_MODEL = "gpt-5.6"
OPENAI_TIMEOUT_MS = "90000"
DARWIN_DEMO_SEED = "1859"
DARWIN_EVENT_COUNT = "10000"
DARWIN_MAX_EVENTS_PER_STUDY = "50000"
DARWIN_MAX_EVENTS_PER_TARGET = "250000"
PROJECTFLOW_REPOSITORY = "sjohnston1972/projectflow"
PROJECTFLOW_BRANCH = "main"
PROJECTFLOW_PRODUCTION_URL = "https://darwin-projectflow.pages.dev/"
PROJECTFLOW_STUDY_URL = "https://darwin-projectflow.pages.dev/?study=true"
PROJECTFLOW_ALLOWED_APP_VERSIONS = "baseline,1.0.0"
ALLOWED_ORIGINS = "https://darwin-control-room.pages.dev,https://darwin-projectflow.pages.dev,https://sjohnston1972.github.io,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"

[[d1_databases]]
binding = "DB"
database_name = "darwin-telemetry"
database_id = "496d0bb1-07ae-4563-bceb-b5c640c0a1ba"
migrations_dir = "migrations"

[[ratelimits]]
name = "INGESTION_RATE_LIMITER"
namespace_id = "1859001"

[ratelimits.simple]
limit = 120
period = 60

[[ratelimits]]
name = "SIMULATION_RATE_LIMITER"
namespace_id = "1859002"

[ratelimits.simple]
limit = 4
period = 60
