name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:

concurrency:
  group: publish-wiki
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish docs/wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Synchronize the GitHub Wiki
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          if ! git clone --depth 1 "$remote" .wiki; then
            mkdir .wiki
            git -C .wiki init --initial-branch=master
            git -C .wiki remote add origin "$remote"
          fi

          rsync --archive --delete --exclude='.git/' docs/wiki/ .wiki/
          git -C .wiki config user.name 'github-actions[bot]'
          git -C .wiki config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C .wiki add --all

          if git -C .wiki diff --cached --quiet; then
            echo 'Wiki already matches docs/wiki.'
            exit 0
          fi

          git -C .wiki commit -m "Sync wiki from ${GITHUB_SHA}"
          git -C .wiki push origin HEAD
