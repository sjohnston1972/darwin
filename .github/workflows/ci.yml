name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check out the tagged ProjectFlow baseline
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: sjohnston1972/projectflow
          ref: demo-baseline-v3
          path: .artifacts/projectflow-target
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Resolve build metadata
        run: node scripts/build-metadata.mjs --github-env
      - run: mkdir -p ci-logs
      - name: Install dependencies
        run: set -o pipefail; npm ci 2>&1 | tee ci-logs/install.log
      - name: Install ProjectFlow test target
        run: npm ci --prefix .artifacts/projectflow-target
      - name: Install browser runtime
        run: npx playwright install --with-deps chromium
      - name: Check formatting
        run: set -o pipefail; npm run format:check 2>&1 | tee ci-logs/format.log
      - name: Lint
        run: set -o pipefail; npm run lint 2>&1 | tee ci-logs/lint.log
      - name: Check generated reasoning context and types
        run: set -o pipefail; npm run typecheck 2>&1 | tee ci-logs/typecheck.log
      - name: Test with measured coverage gates
        run: set -o pipefail; npm run test:coverage 2>&1 | tee ci-logs/test.log
      - name: Browser demo smoke
        env:
          PROJECTFLOW_E2E_DIR: .artifacts/projectflow-target
        run: set -o pipefail; npm run test:e2e -- --grep "@smoke" 2>&1 | tee ci-logs/e2e-smoke.log
      - name: Generate deterministic Linux visual baselines for the hotfix
        env:
          PROJECTFLOW_E2E_DIR: .artifacts/projectflow-target
        run: npx playwright test --grep visual --update-snapshots=all
      - name: Upload generated Linux visual baselines
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deterministic-linux-visual-baselines-${{ github.sha }}
          path: e2e/demo.spec.ts-snapshots/*-linux.png
          if-no-files-found: error
          retention-days: 3
      - name: Build
        run: set -o pipefail; npm run build 2>&1 | tee ci-logs/build.log
      - name: Audit dependencies
        run: set -o pipefail; npm audit --audit-level=high 2>&1 | tee ci-logs/audit.log
      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-diagnostics-${{ github.run_id }}
          path: |
            ci-logs
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
