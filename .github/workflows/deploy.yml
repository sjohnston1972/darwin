name: Deploy Darwin

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semantic version tag to deploy
        required: true
        type: string

concurrency:
  group: darwin-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag }}
      - name: Check out the tagged ProjectFlow baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: sjohnston1972/projectflow
          ref: demo-baseline-v3
          path: .artifacts/projectflow-target
      - name: Require successful CI for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_sha=$(git rev-parse HEAD)
          conclusion=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${release_sha}&status=completed&per_page=10" \
            --jq '.workflow_runs | first | .conclusion // "missing"')
          test "$conclusion" = "success" || {
            echo "CI must pass for ${release_sha}; current result: ${conclusion}"
            exit 1
          }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Resolve release tag and workflow commit
        env:
          DARWIN_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          export DARWIN_COMMIT_SHA="$(git rev-parse HEAD)"
          node scripts/build-metadata.mjs --require-release-tag --github-env
      - run: npm ci
      - run: npm ci --prefix .artifacts/projectflow-target
      - run: npx playwright install --with-deps chromium
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm audit --audit-level=high
      - name: Run the complete browser demo suite before deploy
        env:
          PROJECTFLOW_E2E_DIR: .artifacts/projectflow-target
        run: npm run test:e2e
      - name: Migrate and deploy Cloudflare applications
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
      - name: Verify deployed commit and clean smoke telemetry
        env:
          DARWIN_OPERATOR_TOKEN: ${{ secrets.DARWIN_OPERATOR_TOKEN }}
        run: npm run smoke:production
