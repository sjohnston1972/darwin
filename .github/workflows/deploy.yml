name: Deploy Darwin

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Require successful CI for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&status=completed&per_page=10" \
            --jq '.workflow_runs | first | .conclusion // "missing"')
          test "$conclusion" = "success" || {
            echo "CI must pass for ${GITHUB_SHA}; current result: ${conclusion}"
            exit 1
          }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm audit --audit-level=high
      - run: npm run deploy
      - run: npm run smoke:production
